version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: scraper-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_secure_password
      POSTGRES_DB: telegram_archive
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d telegram_archive"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: scraper-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minio_admin_user
      MINIO_ROOT_PASSWORD: minio_admin_password
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: scraper-app
    ports:
      - "3000:3000"
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_SESSION: ${TELEGRAM_SESSION}
      TELEGRAM_SESSION_FILE_PATH: /app/session/.session
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: telegram_archive
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_secure_password
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY: minio_admin_user
      S3_SECRET_KEY: minio_admin_password
      S3_BUCKET: telegram-archive-media
      CHANNELS: ${CHANNELS}
      IMPORT_CONCURRENCY: ${IMPORT_CONCURRENCY:-1}
      PORT: 3000
    volumes:
      - telegram_session:/app/session
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
  telegram_session:
